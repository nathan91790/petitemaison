name: CI Backend

on:
  push:
    branches: 
      - master
  pull_request:
    branches: 
      - master

jobs:
    build:
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: backend

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                node-version: 20

            - name: Install dependencies
              run: npm install

            - name: Run tests
              run: npm test

            - name: Run security audit
              run: npm audit --audit-level=high