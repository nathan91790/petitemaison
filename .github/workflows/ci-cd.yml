name: CI/CD PetiteMaison

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:

  tests:

    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin123
          POSTGRES_DB: petitemaison
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U admin"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # BACKEND

      - name: Install backend dependencies
        run: |
          cd backend
          npm install

      - name: Run Prisma migrations
        run: |
          cd backend
          npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://admin:admin123@localhost:5432/petitemaison

      - name: Run backend tests
        run: |
          cd backend
          npm test

      # FRONTEND

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Run frontend tests
        run: |
          cd frontend
          npm test -- --run

  docker:

    needs: tests
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build backend image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/petitemaison-backend ./backend

      - name: Build frontend image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/petitemaison-frontend ./frontend

      - name: Push backend image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/petitemaison-backend

      - name: Push frontend image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/petitemaison-frontend

  deploy:

    needs: docker
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          echo "${{ secrets.KUBECONFIG }}" > kubeconfig

      - name: Deploy to Kubernetes
        run: |
          kubectl --kubeconfig=kubeconfig apply -f k8s/