name: CI/CD PetiteMaison

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:

  tests:

    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin123
          POSTGRES_DB: petitemaison
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U admin"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # BACKEND

      - name: Install backend dependencies
        run: |
          cd backend
          npm install

      - name: Run Prisma migrations
        run: |
          cd backend
          npx prisma migrate deploy

      - name: Run backend tests
        run: |
          cd backend
          npm test

      - name: Start backend server
        run: |
          cd backend
          npm start &
          sleep 5

      - name: Run performance test (k6)
        uses: grafana/k6-action@v0.3.1
        with:
          filename: tests/performance/load-test.js

      # FRONTEND

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Run frontend tests
        run: |
          cd frontend
          npm test -- --run

  docker-build:

    needs: tests
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build backend image
        run: |
          docker build -t petitemaison-backend ./backend

      - name: Build frontend image
        run: |
          docker build -t petitemaison-frontend ./frontend

      - name: Scan backend image with Trivy
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: 'petitemaison-backend'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Scan frontend image with Trivy
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: 'petitemaison-frontend'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'